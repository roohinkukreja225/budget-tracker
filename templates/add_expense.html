<!DOCTYPE html>
<html>

<head>

<title>Add Expense</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">

<span class="navbar-brand">
<i class="bi bi-wallet2"></i> Budget Tracker
</span>

<div>
<a href="/dashboard" class="btn btn-light me-2">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="/settings" class="btn btn-warning me-2">
Settings
</a>

<a href="/logout" class="btn btn-outline-light">
Logout
</a>
</div>

</div>
</nav>

<!-- FORM -->
<div class="container mt-5">

<div class="card shadow border-0 mx-auto" style="max-width:500px;">

<div class="card-body">

<h4 class="mb-4 text-center">
<i class="bi bi-plus-circle"></i> Add Expense
</h4>

<form method="POST">

<!-- CATEGORY -->
<div class="mb-3">
<label class="form-label">Category</label>
<select name="category" class="form-select" required>
<option value="">Select Category</option>
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Bills</option>
<option>Entertainment</option>
</select>
</div>

<!-- AMOUNT -->
<div class="mb-3">
<label class="form-label">Amount</label>
<input type="number" step="0.01" name="amount" class="form-control" required>
</div>

<!-- DATE -->
<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" name="date" id="dateField" class="form-control" required>
</div>

<!-- PAYMENT METHOD -->
<div class="mb-3">
<label class="form-label">Payment Method</label>
<select name="payment" class="form-select" required>
<option value="">Select Payment</option>
<option>Cash</option>
<option>Card</option>
<option>UPI</option>
<option>Net Banking</option>
</select>
</div>

<!-- SUBMIT -->
<button class="btn btn-success w-100">
Add Expense
</button>

</form>

</div>

</div>

</div>

<!-- SET DEFAULT DATE -->
<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById("dateField").value = today;
</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <title>Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">
            <i class="bi bi-wallet2"></i> Budget Tracker
        </span>

        <div>
            <a href="/dashboard" class="btn btn-light me-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a href="/logout" class="btn btn-outline-light">
                Logout
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="mb-4">
        <i class="bi bi-gear"></i> Settings
    </h3>

    <div class="row g-4">

        <!-- Profile -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="mb-3">Profile</h5>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input class="form-control" value="Roohin" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" value="roohin@email.com" disabled>
                    </div>

                </div>
            </div>
        </div>

        <!-- Currency -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="mb-3">Currency</h5>

                    <form method="POST" action="/settings">
                        <input type="hidden" name="form_type" value="currency">

                        <select class="form-select" name="currency">
                            <option value="₹" {% if settings.currency == "₹" %}selected{% endif %}>₹ INR</option>
                            <option value="$" {% if settings.currency == "$" %}selected{% endif %}>$ USD</option>
                            <option value="€" {% if settings.currency == "€" %}selected{% endif %}>€ EUR</option>
                            <option value="£" {% if settings.currency == "£" %}selected{% endif %}>£ GBP</option>
                        </select>

                        <br>

                        <button class="btn btn-primary">
                            Save Currency
                        </button>
                    </form>

                </div>
            </div>
        </div>

        <!-- Salary -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="mb-3">Monthly Salary</h5>

                    <form method="POST" action="/settings">
                        <input type="hidden" name="form_type" value="salary">

                        <div class="input-group mb-3">
                            <span class="input-group-text">{{settings.currency}}</span>

                            <input type="number"
                                   name="income"
                                   class="form-control"
                                   value="{{settings.salary}}"
                                   required>
                        </div>

                        <button class="btn btn-success">
                            Update Salary
                        </button>
                    </form>

                </div>
            </div>
        </div>

        <!-- Budget Limits (CONNECTED) -->
        <div class="col-md-12">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="mb-3">Monthly Budget Limits</h5>

                    <form method="POST" action="/settings">

                        <input type="hidden" name="form_type" value="budget">

                        <div class="row g-3">

                            <div class="col-md-3">
                                <label>Food</label>
                                <input class="form-control"
                                       type="number"
                                       name="food_budget"
                                       value="{{ settings.food_budget or 0 }}">
                            </div>

                            <div class="col-md-3">
                                <label>Transport</label>
                                <input class="form-control"
                                       type="number"
                                       name="transport_budget"
                                       value="{{ settings.transport_budget or 0 }}">
                            </div>

                            <div class="col-md-3">
                                <label>Shopping</label>
                                <input class="form-control"
                                       type="number"
                                       name="shopping_budget"
                                       value="{{ settings.shopping_budget or 0 }}">
                            </div>

                            <div class="col-md-3">
                                <label>Entertainment</label>
                                <input class="form-control"
                                       type="number"
                                       name="entertainment_budget"
                                       value="{{ settings.entertainment_budget or 0 }}">
                            </div>

                        </div>

                        <br>

                        <button class="btn btn-primary">
                            Save Budgets
                        </button>

                    </form>

                </div>
            </div>
        </div>

        <!-- Notifications -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="mb-3">Notifications</h5>

                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" checked>
                        <label class="form-check-label">
                            Budget limit alerts
                        </label>
                    </div>

                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" checked>
                        <label class="form-check-label">
                            Weekly spending reports
                        </label>
                    </div>

                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">
                            Large expense warnings
                        </label>
                    </div>

                </div>
            </div>
        </div>

        <!-- Dark Mode -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="mb-3">Appearance</h5>

                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="darkToggle">
                        <label class="form-check-label">
                            Enable Dark Mode
                        </label>
                    </div>

                </div>
            </div>
        </div>

    </div>

</div>

<script>
const toggle = document.getElementById("darkToggle");

toggle.addEventListener("change", function () {
    if (this.checked) {
        document.body.classList.remove("bg-light");
        document.body.classList.add("bg-dark", "text-white");
    } else {
        document.body.classList.remove("bg-dark", "text-white");
        document.body.classList.add("bg-light");
    }
});
</script>

</body>
</html>
